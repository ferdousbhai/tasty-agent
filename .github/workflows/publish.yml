name: Publish and Deploy

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v0.2.1, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi  # Optional: for extra security
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for setuptools_scm

    - name: Derive release version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*

  deploy_modal:
    runs-on: ubuntu-latest
    needs: publish
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Modal
      run: |
        python -m pip install --upgrade pip
        pip install modal

    - name: Deploy Modal app
      env:
        MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
        MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        MODAL_HOST: ${{ vars.MODAL_HOST }}
        TASTY_AGENT_SECRET_NAME: ${{ vars.TASTY_AGENT_SECRET_NAME }}
        TASTY_AGENT_VERSION: ${{ needs.publish.outputs.version }}
      run: |
        if [ -z "${MODAL_TOKEN_ID:-}" ] || [ -z "${MODAL_TOKEN_SECRET:-}" ]; then
          echo "Missing Modal credentials. Set MODAL_TOKEN_ID and MODAL_TOKEN_SECRET GitHub secrets."
          exit 1
        fi

        if [ -z "${MODAL_HOST:-}" ]; then
          echo "Missing MODAL_HOST GitHub variable."
          exit 1
        fi

        for attempt in 1 2 3 4 5; do
          if modal deploy examples/modal_deploy.py; then
            exit 0
          fi

          if [ "$attempt" -eq 5 ]; then
            echo "Modal deploy failed after $attempt attempts."
            exit 1
          fi

          echo "Retrying Modal deploy after waiting for package availability..."
          sleep 30
        done
